name: ecommerce_ar_app
description: E-commerce mobile application with AR features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  google_sign_in: ^6.1.5

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # AR Features
  camera: ^0.10.5
  flutter_3d_controller: ^2.3.0
  google_mlkit_pose_detection: ^0.14.1

  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5
  url_launcher: ^6.2.2
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
